name: Publish Adapter

# On every tag push (v*), cross-compile the adapter for every supported platform,
# lay the binaries out as bin/<os>/<arch>/<name>, and publish them as a single
# multi-platform, signed OCI artifact via the reusable brokenbots/publish-adapter
# action. The action signs keyless by default (needs id-token: write, below).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (without leading v)"
        required: false
        default: "0.0.0-dev"

permissions:
  contents: read
  packages: write
  id-token: write # cosign keyless signing

env:
  # The published binary name; defaults to the repo name. Rename when you fork
  # this starter (e.g. criteria-adapter-myadapter).
  BIN: ${{ github.event.repository.name }}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Cross-compile adapter binaries
        # Pure-Go adapter: cross-compile every supported platform from one runner
        # into artifact/bin/<os>/<arch>/. `criteria adapter publish` scans the
        # bin/ tree under the directory it is given (artifact/) and packages all
        # platforms into a single multi-platform OCI artifact.
        run: |
          set -euo pipefail
          for platform in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            os="${platform%/*}"; arch="${platform#*/}"
            outdir="artifact/bin/${os}/${arch}"
            mkdir -p "$outdir"
            echo "building ${platform}"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
              go build -trimpath -o "$outdir/${BIN}" .
          done

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Publish
        uses: brokenbots/publish-adapter@v0
        with:
          # Directory containing the multi-platform bin/<os>/<arch>/ tree.
          binary: ${{ github.workspace }}/artifact
          registry: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:${{ steps.ver.outputs.tag }}
