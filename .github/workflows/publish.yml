name: Publish Adapter

# On every tag push (v*), build the adapter binary and publish it as a signed
# OCI artifact via the reusable brokenbots/publish-adapter action. The action
# signs keyless by default (needs id-token: write, granted below). To also ship
# a runnable container image, build + push it and pass its reference via the
# action's `image:` input (see the commented Dockerfile).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (without leading v)"
        required: false
        default: "0.0.0-dev"

permissions:
  contents: read
  packages: write
  id-token: write # cosign keyless signing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"

      - name: Build adapter binary
        run: |
          mkdir -p out
          go build -o out/adapter .

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Publish
        uses: brokenbots/publish-adapter@v0
        with:
          binary: ${{ github.workspace }}/out/adapter
          registry: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:${{ steps.ver.outputs.tag }}
